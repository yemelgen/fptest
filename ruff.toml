target-version = "py312"
line-length = 120
src = ["src"]

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific
]
ignore = [
    "E501",   # line too long (formatter handles it)
    "SIM108", # ternary operator (readability preference)
]

[format]
quote-style = "double"
